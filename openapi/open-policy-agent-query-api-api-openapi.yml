openapi: 3.1.0
info:
  title: Compile Query API API
  description: API for partially evaluating Rego queries in OPA (Open Policy Agent).
  version: 1.0.0
tags:
- name: Query API
paths:
  /:
    post:
      summary: Execute a Simple Query
      description: Execute a simple query using the default decision (`/data/system/main`).
      requestBody:
        description: Input document in JSON or YAML format.
        required: true
        content:
          application/json:
            schema:
              type: object
          application/yaml:
            schema:
              type: object
      parameters:
      - name: pretty
        in: query
        required: false
        description: Format response for human readability
        schema:
          type: boolean
      responses:
        '200':
          description: Query executed successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '404':
          description: Document not found
        '500':
          description: Server error
      tags:
      - Query API

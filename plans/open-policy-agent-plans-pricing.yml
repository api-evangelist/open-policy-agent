notes: Open Policy Agent (OPA) is a CNCF graduated open-source project distributed under Apache 2.0.
  There is no commercial pricing for OPA itself — the project is free to download and self-host. Commercial
  offerings exist via Styra (the company that originated OPA) under Styra DAS, but those are not OPA-branded
  plans. This artifact is kept as a scaffold pending a decision on whether to model Styra DAS pricing here.
description: Open Policy Agent (OPA) is an open-source, general-purpose policy engine. The project itself
  is free under Apache 2.0; there is no per-API or per-call pricing surface. Production support is offered
  separately by Styra and other vendors.
sources:
  - https://www.openpolicyagent.org/
  - https://github.com/open-policy-agent/opa
plans:
  - id: open-policy-agent-oss
    name: Open Source
    type: freemium
    description: OPA is free and open source under Apache 2.0. Self-host or run as a Kubernetes admission
      controller, sidecar, or library.
    entries:
      - label: Self-hosted usage
        name: self_hosted
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Rego policy language
      - name: REST API for policy evaluation
      - name: Bundle service integration
      - name: Decision logging
      - name: Community support via Slack and GitHub

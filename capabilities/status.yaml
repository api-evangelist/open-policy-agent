naftiko: 1.0.0-alpha2
info:
  label: Status API
  description: 'Status API. 1 operations. Lead operation: Get OPA Status. Self-contained Naftiko capability covering one Open
    Policy Agent business surface.'
  tags:
  - Open Policy Agent
  - Status API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_POLICY_AGENT_API_KEY: OPEN_POLICY_AGENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: status
    baseUri: ''
    description: Status API business capability. Self-contained, no shared references.
    resources:
    - name: v1-status
      path: /v1/status
      operations:
      - name: get
        method: GET
        description: Get OPA Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pretty
          in: query
          type: boolean
          description: Format response for human readability.
  exposes:
  - type: rest
    namespace: status-rest
    port: 8080
    description: REST adapter for Status API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/status
      name: v1-status
      description: REST surface for v1-status.
      operations:
      - method: GET
        name: get
        description: Get OPA Status
        call: status.get
        with:
          pretty: rest.pretty
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Status API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: get-opa-status
      description: Get OPA Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status.get
      with:
        pretty: tools.pretty
      outputParameters:
      - type: object
        mapping: $.

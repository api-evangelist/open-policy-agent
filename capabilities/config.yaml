naftiko: 1.0.0-alpha2
info:
  label: Config API
  description: 'Config API. 1 operations. Lead operation: Get OPA Configuration. Self-contained Naftiko capability covering
    one Open Policy Agent business surface.'
  tags:
  - Open Policy Agent
  - Config API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_POLICY_AGENT_API_KEY: OPEN_POLICY_AGENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: config
    baseUri: ''
    description: Config API business capability. Self-contained, no shared references.
    resources:
    - name: v1-config
      path: /v1/config
      operations:
      - name: get
        method: GET
        description: Get OPA Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pretty
          in: query
          type: boolean
          description: Format response for human readability.
  exposes:
  - type: rest
    namespace: config-rest
    port: 8080
    description: REST adapter for Config API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/config
      name: v1-config
      description: REST surface for v1-config.
      operations:
      - method: GET
        name: get
        description: Get OPA Configuration
        call: config.get
        with:
          pretty: rest.pretty
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: config-mcp
    port: 9090
    transport: http
    description: MCP adapter for Config API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: get-opa-configuration
      description: Get OPA Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: config.get
      with:
        pretty: tools.pretty
      outputParameters:
      - type: object
        mapping: $.
